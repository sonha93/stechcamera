<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:800px;
  margin:auto;
  padding:20px;
}

/* KHUNG CHUNG */
.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

/* TIÊU ĐỀ THANH TOÁN NẰM TRONG KHUNG */
.title-box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

/* ITEM */
.item{
  display:flex;
  gap:10px;
  padding:10px 0;
  border-bottom:1px solid #eee;
  align-items:center;
}

.item img{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:8px;
}

/* CALC */
.calc{
  display:flex;
  gap:6px;
  font-size:12px;
  color:#666;
  margin-top:5px;
  align-items:center;
}

.calc span{
  min-width:12px;
  text-align:center;
}

/* INPUT */
input, textarea, select{
  width:100%;
  padding:10px;
  margin-top:6px;
  margin-bottom:10px;
  border:1px solid #ddd;
  border-radius:8px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,#1e88e5,#00acc1,#43a047);
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.btn:hover{
  opacity:0.9;
}

/* BANK */
#bankInfo{
  display:none;
  background:#fff;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

/* TOTAL */
.total{
  text-align:right;
  font-size:18px;
  font-weight:bold;
  color:#b71c1c;
  margin-top:10px;
}

/* BACK */
.back-btn{
  display:inline-block;
  margin-bottom:15px;
  background:#fff;
  color:#00acc1;
  padding:8px 12px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
  font-weight:bold;
  border:1px solid #e0f7fa;
}

.back-btn:hover{
  background:#e0f7fa;
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-btn">← Quay lại</a>

<!-- TIÊU ĐỀ ĐÃ ĐƯA VÀO KHUNG -->
<div class="title-box">💳 Thanh toán đơn hàng</div>

<!-- GIỎ HÀNG -->
<div class="box" id="cartBox"></div>

<!-- THÔNG TIN -->
<div class="box">
  <h3>📦 Thông tin giao hàng</h3>
  <input id="name" placeholder="Họ tên">
  <input id="phone" placeholder="Số điện thoại">
  <textarea id="address" placeholder="Địa chỉ"></textarea>
</div>

<!-- THANH TOÁN -->
<div class="box">
  <h3>💰 Thanh toán</h3>

  <select id="payment">
    <option value="cod">COD</option>
    <option value="bank">Chuyển khoản</option>
  </select>

  <div id="bankInfo">
    <h3>🏦 Vietinbank</h3>
    <p>HOANG ANH SON</p>
    <p>101005245058</p>

    <img id="qr"
      style="width:100%;max-width:250px;margin-top:10px;border-radius:8px;">
  </div>
</div>

<button class="btn" onclick="placeOrder()">🛒 Đặt hàng</button>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart(){
  const box = document.getElementById("cartBox");
  box.innerHTML = "";

  if(cart.length === 0){
    box.innerHTML = "Giỏ hàng trống";
    return;
  }

  let total = 0;

  cart.forEach(p=>{
    let qty = p.qty || 1;
    let price = p.price;
    let sub = qty * price;

    total += sub;

    box.innerHTML += `
      <div class="item">
        <img src="${p.img}">
        <div>
          <b>${p.name}</b>

          <div class="calc">
            <span>${qty}</span>
            <span>×</span>
            <span>${price.toLocaleString()}đ</span>
            <span>=</span>
            <span>${sub.toLocaleString()}đ</span>
          </div>

        </div>
      </div>
    `;
  });

  box.innerHTML += `
    <div class="total">
      Tổng tiền: ${total.toLocaleString()}đ
    </div>
  `;
}

/* BANK */
function updateBank(){
  let payment = document.getElementById("payment").value;
  let bank = document.getElementById("bankInfo");

  let total = 0;
  cart.forEach(p=>{
    total += p.price * (p.qty || 1);
  });

  if(payment === "bank"){
    bank.style.display = "block";

    document.getElementById("qr").src =
      "https://img.vietqr.io/image/ICB-101005245058-compact2.png?amount="
      + total +
      "&addInfo=Thanh%20toan";
  } else {
    bank.style.display = "none";
  }
}

document.getElementById("payment").addEventListener("change", updateBank);

/* ===== BẮT BUỘC NHẬP ĐỦ THÔNG TIN ===== */
function placeOrder(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("address").value.trim();

  if(name === "" || phone === "" || address === ""){
    alert("⚠️ Vui lòng nhập đầy đủ thông tin giao hàng!");
    return;
  }

  alert("Đặt hàng thành công 🎉");
  localStorage.removeItem("cart");
  window.location.href = "index.html";
}

renderCart();
updateBank();
</script>

</body>
</html>
