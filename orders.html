<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý đơn hàng</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.order{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

.item{
  border-top:1px solid #eee;
  padding:5px 0;
  font-size:14px;
}

.badge{
  color:#fff;
  background:#ee4d2d;
  padding:3px 8px;
  border-radius:5px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📦 Quản lý đơn hàng</h2>
  <div id="orders"></div>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function renderOrders(){
  const box = document.getElementById("orders");
  box.innerHTML = "";

  if(orders.length === 0){
    box.innerHTML = "Chưa có đơn hàng nào";
    return;
  }

  orders.reverse().forEach(o=>{
    box.innerHTML += `
      <div class="order">
        <h3>👤 ${o.name} - ${o.phone}</h3>
        <p>📍 ${o.address}</p>
        <p>💳 ${o.payment}</p>
        <p>🕒 ${o.time}</p>

        <div class="badge">ĐƠN #${o.id}</div>

        <h4>Sản phẩm:</h4>
        ${o.cart.map(p=>`
          <div class="item">
            ${p.name} - ${p.price.toLocaleString()}đ x ${p.qty}
          </div>
        `).join("")}
      </div>
    `;
  });
}

renderOrders();
</script>

</body>
</html>
